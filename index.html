  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --surface-0:#F4F6F9;--surface-1:#ECEEF3;--surface-2:#FFFFFF;
      --text-primary:#0F1B2D;--text-secondary:#6B7B8D;--text-muted:#9BA8B5;
      --text-danger:#B22222;--text-success:#006338;--text-accent:#1A4A8A;
      --border:#E2E8F0;--border-strong:#C8D0DC;
      --border-accent:rgba(26,74,138,0.3);--border-success:rgba(0,99,56,0.3);--border-danger:rgba(178,34,34,0.3);
      --bg-success:#E5F2EC;--bg-danger:#F8ECEC;
      --radius:8px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;
    }
    body{font-family:var(--font-sans);background:var(--surface-0);color:var(--text-primary);-webkit-font-smoothing:antialiased}
    input,select,textarea{font-family:var(--font-sans);font-size:13px;color:var(--text-primary);background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:0 12px;height:40px;outline:none;transition:border-color 0.15s;display:block;width:100%}
    textarea{height:auto;padding:12px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#1B2B4B;box-shadow:0 0 0 3px rgba(27,43,75,0.08)}
    input::placeholder,textarea::placeholder{color:var(--text-muted)}
    select{cursor:pointer}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:10px}
    button{font-family:var(--font-sans)}
    code{background:var(--surface-1);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}
    pre{background:#1e293b;color:#e2e8f0;padding:14px 16px;border-radius:var(--radius);font-size:12px;overflow-x:auto;line-height:1.6}
  </style>

/* ── 공통 컴포넌트 ── */
function Btn({onClick,children,style={},disabled=false}){
  return <button onClick={onClick} disabled={disabled}
    style={{border:'none',cursor:disabled?'not-allowed':'pointer',fontFamily:'var(--font-sans)',display:'inline-flex',alignItems:'center',gap:5,opacity:disabled?0.6:1,...style}}>{children}</button>;
}
function FmtBadge({format}){
  const m={PDF:['#1A4A8A','#E8EFF8'],JPG:['#006338','#E5F2EC'],PSD:['#6A3DAA','#F0EAFB'],AI:['#C07000','#FFF3E0']};
  const [col,bg]=m[format]||['#555','#eee'];
  return <span style={{display:'inline-block',fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:3,background:bg,color:col,letterSpacing:'0.04em'}}>{format}</span>;

function AuthWrap({children}){
  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0D1E3A 0%,#1B2B4B 60%,#243659 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem'}}>

        </div>
        {children}
      </div>
    </div>
  );
}
function Card({children,style={}}){
  return <div style={{background:'rgba(255,255,255,0.97)',borderRadius:14,padding:'2rem',boxShadow:'0 24px 64px rgba(0,0,0,0.35)',...style}}>{children}</div>;
}
function Field({label,hint,children}){
  return (
    <div style={{marginBottom:13}}>
      <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:5}}>
        {label}{hint&&<span style={{color:'var(--text-danger)',marginLeft:2}}>{hint}</span>}
      </label>
      {children}
    </div>
  );
}

/* ══════════════════════════════════════════════
   화면 2: 로그인
   ══════════════════════════════════════════════ */
function LoginScreen({onSignup,authMsg,onClearMsg}){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [resetSent,setResetSent]=useState(false);

  async function handleLogin(){
    if(!email||!pw){setErr('이메일과 비밀번호를 입력해주세요.');return;}
    setLoading(true);setErr('');if(onClearMsg)onClearMsg();
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    setLoading(false);
    if(error) setErr('이메일 또는 비밀번호가 올바르지 않습니다.');
  }

  async function handleForgotPassword(){
    if(!email){setErr('비밀번호를 재설정할 이메일을 먼저 입력해주세요.');return;}
    setLoading(true);
    await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
    setLoading(false);setResetSent(true);
  }

  return (
    <AuthWrap>
      <Card>
        <div style={{fontSize:16,fontWeight:500,textAlign:'center',marginBottom:20}}>파트너 로그인</div>
        {authMsg&&(
          <div style={{background:'var(--bg-danger)',border:'0.5px solid var(--border-danger)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:14,fontSize:13,color:'var(--text-danger)',display:'flex',gap:7}}>
            <i className="ti ti-alert-circle" style={{fontSize:16,flexShrink:0}}></i>
            {authMsg}
          </div>
        )}
        {resetSent&&(
          <div style={{background:'var(--bg-success)',border:'0.5px solid var(--border-success)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:14,fontSize:13,color:'var(--text-success)',display:'flex',gap:7}}>
            <i className="ti ti-circle-check" style={{fontSize:16,flexShrink:0}}></i>
            비밀번호 재설정 이메일을 발송했습니다. 이메일을 확인해주세요.
          </div>
        )}
        <Field label="이메일">
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="이메일 주소"/>
        </Field>
        <Field label="비밀번호">
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="비밀번호"/>
        </Field>
        {err&&<p style={{fontSize:12,color:'var(--text-danger)',margin:'0 0 12px'}}>{err}</p>}
        <Btn onClick={handleLogin} disabled={loading}
          style={{width:'100%',padding:'11px',background:NAVY,color:'#fff',borderRadius:'var(--radius)',fontSize:14,fontWeight:500,justifyContent:'center',marginBottom:12}}>
          {loading?<><i className="ti ti-loader-2" style={{fontSize:16}}></i>로그인 중...</>:'로그인'}
        </Btn>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <button onClick={handleForgotPassword}
            style={{background:'transparent',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)',padding:0}}>
            비밀번호를 잊으셨나요?
          </button>
          <Btn onClick={onSignup}
            style={{background:'transparent',fontSize:13,color:NAVY,fontWeight:500,padding:0}}>
            회원가입 <i className="ti ti-arrow-right" style={{fontSize:13}}></i>
          </Btn>
        </div>
      </Card>
    </AuthWrap>
  );
}

/* ══════════════════════════════════════════════
   화면 3: 회원가입
   ══════════════════════════════════════════════ */
function SignupScreen({onLogin}){
  const [academyName,setAcademyName]=useState('');
  const [managerName,setManagerName]=useState('');
  const [phone,setPhone]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);

  async function handleSignup(){
    if(!academyName||!email||!pw){setErr('학원명, 이메일, 비밀번호는 필수입니다.');return;}
    if(pw!==pw2){setErr('비밀번호가 일치하지 않습니다.');return;}
    if(pw.length<6){setErr('비밀번호는 6자 이상이어야 합니다.');return;}
    setLoading(true);setErr('');
    const {data,error}=await sb.auth.signUp({email,password:pw,options:{data:{academy_name:academyName}}});
    if(error){setLoading(false);setErr(error.message==='User already registered'?'이미 가입된 이메일입니다.':error.message);return;}
    if(data.user){
      const {error:profErr}=await sb.from('profiles').insert({id:data.user.id,email,academy_name:academyName,manager_name:managerName,phone,status:'approved'});
      if(profErr){setLoading(false);setErr('프로필 저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');return;}
    }
    setLoading(false);setDone(true);
  }

  if(done) return (
    <AuthWrap>
      <Card style={{textAlign:'center'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:'var(--bg-success)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          <i className="ti ti-circle-check" style={{fontSize:28,color:'var(--text-success)'}}></i>
        </div>
        <div style={{fontSize:16,fontWeight:500,marginBottom:8}}>가입 완료!</div>
        <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.75,marginBottom:20}}>
          <strong>{academyName}</strong>의 파트너 가입이 완료되었습니다.<br/>
          지금 바로 로그인하여<br/>
          파트너 허브를 이용하실 수 있습니다.
        </div>
        <Btn onClick={onLogin} style={{background:NAVY,color:'#fff',borderRadius:'var(--radius)',padding:'9px 24px',fontSize:13,fontWeight:500,justifyContent:'center',width:'100%'}}>
          로그인 화면으로
        </Btn>
      </Card>
    </AuthWrap>
  );

  return (
    <AuthWrap>
      <Card>
        <div style={{fontSize:16,fontWeight:500,textAlign:'center',marginBottom:4}}>파트너 회원가입</div>
        <div style={{fontSize:12,color:'var(--text-secondary)',textAlign:'center',marginBottom:20}}>가입 후 바로 파트너 허브를 이용하실 수 있습니다</div>
        <div style={{background:'var(--surface-0)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:NAVY,letterSpacing:'0.08em',marginBottom:8}}>학원 정보</div>
          <Field label="학원명" hint=" *">
            <input value={academyName} onChange={e=>setAcademyName(e.target.value)} placeholder="예: 인투영어학원"/>
          </Field>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Field label="원장님 성함">
              <input value={managerName} onChange={e=>setManagerName(e.target.value)} placeholder="성함"/>
            </Field>
            <Field label="연락처">
              <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000"/>
            </Field>
          </div>
        </div>
        <div style={{background:'var(--surface-0)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:NAVY,letterSpacing:'0.08em',marginBottom:8}}>계정 정보</div>
          <Field label="이메일" hint=" *">
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="이메일 주소"/>
          </Field>
          <Field label="비밀번호" hint=" *">
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="6자 이상"/>
          </Field>
          <Field label="비밀번호 확인" hint=" *">
            <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSignup()} placeholder="비밀번호 재입력"/>
          </Field>
        </div>
        {err&&<p style={{fontSize:12,color:'var(--text-danger)',margin:'0 0 12px'}}>{err}</p>}
        <Btn onClick={handleSignup} disabled={loading}
          style={{width:'100%',padding:'11px',background:NAVY,color:'#fff',borderRadius:'var(--radius)',fontSize:14,fontWeight:500,justifyContent:'center',marginBottom:12}}>
          {loading?<><i className="ti ti-loader-2" style={{fontSize:16}}></i>처리 중...</>:'가입 신청하기'}
        </Btn>
        <div style={{textAlign:'center'}}>
          <button onClick={onLogin} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)'}}>
            이미 계정이 있으신가요? <span style={{color:NAVY,fontWeight:500}}>로그인</span>
          </button>
        </div>
      </Card>
    </AuthWrap>
  );
}

            :<>가입 신청이 접수되었습니다.<br/>인투유학 담당자 검토 후 이메일로 안내드립니다.<br/>보통 <strong>영업일 기준 1~2일</strong> 내로 처리됩니다.</>

/* ══════════════════════════════════════════════
   화면 5: 비밀번호 재설정
   ══════════════════════════════════════════════ */
function ResetPasswordScreen(){
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);

  async function handleReset(){
    if(!pw||!pw2){setErr('새 비밀번호를 입력해주세요.');return;}
    if(pw!==pw2){setErr('비밀번호가 일치하지 않습니다.');return;}
    if(pw.length<6){setErr('비밀번호는 6자 이상이어야 합니다.');return;}
    setLoading(true);
    const {error}=await sb.auth.updateUser({password:pw});
    setLoading(false);
    if(error){setErr('오류가 발생했습니다. 다시 시도해주세요.');return;}
    setDone(true);
  }

  return (
    <AuthWrap>
      <Card>
        {done?(
          <div style={{textAlign:'center'}}>
            <div style={{width:48,height:48,borderRadius:'50%',background:'var(--bg-success)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <i className="ti ti-circle-check" style={{fontSize:24,color:'var(--text-success)'}}></i>
            </div>
            <div style={{fontSize:15,fontWeight:500,marginBottom:6}}>비밀번호가 변경되었습니다</div>
            <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>새 비밀번호로 다시 로그인해주세요.</div>
            <Btn onClick={()=>{sb.auth.signOut();window.location.hash='';}}
              style={{background:NAVY,color:'#fff',borderRadius:'var(--radius)',padding:'9px 24px',fontSize:13,fontWeight:500,width:'100%',justifyContent:'center'}}>
              로그인하기
            </Btn>
          </div>
        ):(
          <>
            <div style={{fontSize:16,fontWeight:500,textAlign:'center',marginBottom:20}}>새 비밀번호 설정</div>
            <Field label="새 비밀번호">
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="6자 이상"/>
            </Field>
            <Field label="새 비밀번호 확인">
              <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleReset()} placeholder="비밀번호 재입력"/>
            </Field>
            {err&&<p style={{fontSize:12,color:'var(--text-danger)',margin:'0 0 12px'}}>{err}</p>}
            <Btn onClick={handleReset} disabled={loading}
              style={{width:'100%',padding:'11px',background:NAVY,color:'#fff',borderRadius:'var(--radius)',fontSize:14,fontWeight:500,justifyContent:'center'}}>
              {loading?'변경 중...':'비밀번호 변경'}
            </Btn>
          </>
        )}
      </Card>
    </AuthWrap>
  );
}

/* ══════════════════════════════════════════════
   메인 앱
   ══════════════════════════════════════════════ */
function MainApp({user,profile,isAdmin}){
  const [tab,setTab]=useState('dashboard');
  const [filterC,setFilterC]=useState('전체');
  const [filterP,setFilterP]=useState('전체');
  const [filterF,setFilterF]=useState('전체');
  const [query,setQuery]=useState('');
  const [dlLoading,setDlLoading]=useState(null);
  const [dlDone,setDlDone]=useState(new Set());
  const [toast,setToast]=useState(null);
  const [matModal,setMatModal]=useState(null);
  const [noticeModal,setNoticeModal]=useState(null);
  const [notifSeen,setNotifSeen]=useState(false);
  const [myHistory,setMyHistory]=useState([]);
  const [adminTab,setAdminTab]=useState('accounts');
  const [partners,setPartners]=useState([]);
  const [loadingPartners,setLoadingPartners]=useState(false);

  // 자료(materials) 상태 — Supabase materials 테이블 + Storage 연동
  const [materials,setMaterials]=useState([]);
  const [loadingMaterials,setLoadingMaterials]=useState(false);
  const [upFile,setUpFile]=useState(null);
  const [upTitle,setUpTitle]=useState('');
  const [upCountry,setUpCountry]=useState('전체');
  const [upProgram,setUpProgram]=useState('전체');
  const [upHot,setUpHot]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [upErr,setUpErr]=useState('');
  const [deletingId,setDeletingId]=useState(null);

  // 국가(countries) 상태 — Supabase countries 테이블, 관리자가 추가/삭제 가능
  const [countries,setCountries]=useState([]);
  const [loadingCountries,setLoadingCountries]=useState(false);
  const [newCountryName,setNewCountryName]=useState('');
  const [newCountryCode,setNewCountryCode]=useState('');
  const [addingCountry,setAddingCountry]=useState(false);

  // 공지사항 상태 — Supabase notices 테이블, 관리자가 작성/삭제
  const [notices,setNotices]=useState([]);
  const [loadingNotices,setLoadingNotices]=useState(false);
  const [noticeTitle,setNoticeTitle]=useState('');
  const [noticeBody,setNoticeBody]=useState('');
  const [postingNotice,setPostingNotice]=useState(false);

  // 자료 요청함(관리자 전용 조회) 상태
  const [requests,setRequests]=useState([]);
  const [loadingRequests,setLoadingRequests]=useState(false);

  // 파트너 정보 수정(관리자) 상태
  const [editPartner,setEditPartner]=useState(null);
  const [savingPartner,setSavingPartner]=useState(false);

  // 자료 요청 상태
  const [rName,setRName]=useState(profile?.academy_name||'');
  const [rManager,setRManager]=useState(profile?.manager_name||'');
  const [rPhone,setRPhone]=useState(profile?.phone||'');
  const [rEmail,setREmail]=useState(user?.email||'');
  const [rTypes,setRTypes]=useState([]);
  const [rQty,setRQty]=useState('');
  const [rSize,setRSize]=useState('');
  const [rPrint,setRPrint]=useState('');
  const [rCopy,setRCopy]=useState('');
  const [rUsage,setRUsage]=useState('');
  const [rDeadline,setRDeadline]=useState('');
  const [rBudget,setRBudget]=useState('');
  const [rNote,setRNote]=useState('');
  const [rSubmitted,setRSubmitted]=useState(false);
  const [rSubmitting,setRSubmitting]=useState(false);

  // 내 비밀번호 변경 상태
  const [myPw,setMyPw]=useState('');
  const [myPw2,setMyPw2]=useState('');
  const [myPwErr,setMyPwErr]=useState('');
  const [myPwOk,setMyPwOk]=useState(false);
  const [myPwLoading,setMyPwLoading]=useState(false);

  const displayName = isAdmin ? '관리자' : (profile?.academy_name || user?.email || '파트너');
  const newNotifCount=notices.filter(n=>n.is_new).length;
  const COUNTRIES=['전체',...countries.map(c=>c.name)];
  const AUTO_PALETTE=[{color:'#1A4A8A',bg:'#E8EFF8'},{color:'#0038A8',bg:'#E5EAF6'},{color:'#006338',bg:'#E5F2EC'},{color:'#B22222',bg:'#F8ECEC'},{color:'#7B3DAA',bg:'#F0EAFB'},{color:'#C07000',bg:'#FFF3E0'},{color:'#1B2F6E',bg:'#E8EBF5'},{color:'#00247D',bg:'#E5EAF3'}];

  function countryMeta(name){
    const c=countries.find(x=>x.name===name);
    return c?{color:c.color,bg:c.bg,code:c.code}:{color:'#5F5E5A',bg:'#F1EFE8',code:'ALL'};
  }
  function CoBadge({country,small}){
    const c=countryMeta(country);
    return <span style={{display:'inline-flex',alignItems:'center',background:c.bg,color:c.color,fontSize:small?11:12,fontWeight:500,padding:small?'2px 6px':'3px 8px',borderRadius:4}}>{c.code}</span>;
  }

  function showToast(msg,type='success'){setToast({msg,type});setTimeout(()=>setToast(null),3200);}
  function toggleType(t){setRTypes(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);}

  async function handleDownload(item){
    if(!item.file_url){showToast('다운로드 가능한 파일이 없습니다.','error');return;}
    setDlLoading(item.id);
    try{
      await sb.from('materials').update({downloads:(item.downloads||0)+1}).eq('id',item.id);
      setMaterials(p=>p.map(m=>m.id===item.id?{...m,downloads:(m.downloads||0)+1}:m));
      const a=document.createElement('a');
      a.href=item.file_url;a.target='_blank';a.rel='noopener';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setDlDone(p=>new Set([...p,item.id]));
      setMyHistory(p=>[{...item,dlDate:new Date().toLocaleDateString('ko-KR')},...p.filter(h=>h.id!==item.id)]);
      showToast('"'+item.title+'" 다운로드를 시작합니다.');
    }catch(e){
      showToast('다운로드 중 오류가 발생했습니다.','error');
    }finally{
      setDlLoading(null);
    }
  }

  async function loadPartners(){
    if(!isAdmin)return;
    setLoadingPartners(true);
    const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
    setPartners(data||[]);setLoadingPartners(false);
  }

  async function loadMaterials(){
    setLoadingMaterials(true);
    const {data,error}=await sb.from('materials').select('*').order('created_at',{ascending:false});
    if(!error)setMaterials(data||[]);
    setLoadingMaterials(false);
  }

  useEffect(()=>{loadMaterials();loadCountries();loadNotices();},[]);

  async function loadCountries(){
    setLoadingCountries(true);
    const {data,error}=await sb.from('countries').select('*').order('sort_order',{ascending:true});
    if(!error)setCountries(data||[]);
    setLoadingCountries(false);
  }

  async function handleAddCountry(){
    if(!newCountryName.trim()||!newCountryCode.trim()){showToast('국가명과 코드를 입력해주세요.','error');return;}
    setAddingCountry(true);
    const pick=AUTO_PALETTE[countries.length%AUTO_PALETTE.length];
    const {error}=await sb.from('countries').insert({
      name:newCountryName.trim(),code:newCountryCode.trim().toUpperCase(),
      color:pick.color,bg:pick.bg,sort_order:countries.length,
    });
    setAddingCountry(false);
    if(error){showToast('추가 중 오류가 발생했습니다. (이미 있는 국가일 수 있어요)','error');return;}
    setNewCountryName('');setNewCountryCode('');
    showToast('국가가 추가되었습니다.');
    loadCountries();
  }

  async function handleDeleteCountry(c){
    if(!window.confirm(`"${c.name}"을(를) 삭제하시겠습니까? 이미 등록된 자료의 국가 표시는 유지되지만 필터 목록에서 빠집니다.`))return;
    const {error}=await sb.from('countries').delete().eq('id',c.id);
    if(error){showToast('삭제 중 오류가 발생했습니다.','error');return;}
    setCountries(p=>p.filter(x=>x.id!==c.id));
    showToast('삭제되었습니다.');
  }

  async function loadNotices(){
    setLoadingNotices(true);
    const {data,error}=await sb.from('notices').select('*').order('created_at',{ascending:false});
    if(!error)setNotices(data||[]);
    setLoadingNotices(false);
  }

  async function handleAddNotice(){
    if(!noticeTitle.trim()||!noticeBody.trim()){showToast('제목과 내용을 입력해주세요.','error');return;}
    setPostingNotice(true);
    const {error}=await sb.from('notices').insert({title:noticeTitle.trim(),body:noticeBody.trim(),is_new:true});
    setPostingNotice(false);
    if(error){showToast('등록 중 오류가 발생했습니다.','error');return;}
    setNoticeTitle('');setNoticeBody('');
    showToast('공지사항이 등록되었습니다.');
    loadNotices();
  }

  async function handleDeleteNotice(n){
    if(!window.confirm(`"${n.title}" 공지사항을 삭제하시겠습니까?`))return;
    const {error}=await sb.from('notices').delete().eq('id',n.id);
    if(error){showToast('삭제 중 오류가 발생했습니다.','error');return;}
    setNotices(p=>p.filter(x=>x.id!==n.id));
    if(noticeModal?.id===n.id)setNoticeModal(null);
    showToast('삭제되었습니다.');
  }

  async function loadRequests(){
    if(!isAdmin)return;
    setLoadingRequests(true);
    const {data,error}=await sb.from('material_requests').select('*').order('created_at',{ascending:false});
    if(!error)setRequests(data||[]);
    setLoadingRequests(false);
  }

  async function handleRequestStatusChange(id,status){
    const {error}=await sb.from('material_requests').update({status}).eq('id',id);
    if(error){showToast('오류가 발생했습니다.','error');return;}
    setRequests(p=>p.map(x=>x.id===id?{...x,status}:x));
    showToast(status==='done'?'처리완료로 변경했습니다.':'대기 상태로 변경했습니다.');
  }

  async function handleSavePartner(){
    if(!editPartner)return;
    setSavingPartner(true);
    const {error}=await sb.from('profiles').update({
      academy_name:editPartner.academy_name,
      manager_name:editPartner.manager_name,
      phone:editPartner.phone,
    }).eq('id',editPartner.id);
    setSavingPartner(false);
    if(error){showToast('수정 중 오류가 발생했습니다.','error');return;}
    setPartners(p=>p.map(x=>x.id===editPartner.id?{...x,...editPartner}:x));
    setEditPartner(null);
    showToast('파트너 정보가 수정되었습니다.');
  }

  async function handleUploadMaterial(){
    if(!upFile){setUpErr('파일을 선택해주세요.');return;}
    if(!upTitle.trim()){setUpErr('자료명을 입력해주세요.');return;}
    setUploading(true);setUpErr('');
    const ext=(upFile.name.split('.').pop()||'').toUpperCase();
    const safeName=upFile.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
    const path=`${Date.now()}_${safeName}`;
    const {error:storErr}=await sb.storage.from('materials').upload(path,upFile,{cacheControl:'3600',upsert:false});
    if(storErr){setUploading(false);setUpErr('파일 업로드 중 오류가 발생했습니다.');return;}
    const {data:pub}=sb.storage.from('materials').getPublicUrl(path);
    const sizeMB=(upFile.size/1024/1024).toFixed(1)+'MB';
    const {error:insErr}=await sb.from('materials').insert({
      title:upTitle.trim(),country:upCountry,program:upProgram,format:ext,size:sizeMB,
      file_url:pub?.publicUrl,file_path:path,is_hot:upHot,is_new:true,downloads:0,
    });
    setUploading(false);
    if(insErr){setUpErr('DB 저장 중 오류가 발생했습니다.');return;}
    setUpFile(null);setUpTitle('');setUpCountry('전체');setUpProgram('전체');setUpHot(false);
    showToast('자료가 업로드되었습니다.');
    loadMaterials();
  }

  async function handleDeleteMaterial(m){
    if(!isAdmin)return;
    if(!window.confirm(`"${m.title}" 자료를 삭제하시겠습니까?`))return;
    setDeletingId(m.id);
    if(m.file_path){
      await sb.storage.from('materials').remove([m.file_path]);
    }
    const {error}=await sb.from('materials').delete().eq('id',m.id);
    setDeletingId(null);
    if(error){showToast('삭제 중 오류가 발생했습니다.','error');return;}
    setMaterials(p=>p.filter(x=>x.id!==m.id));
    showToast('삭제되었습니다.');
  }

  async function handleDeletePartner(p){
    if(!window.confirm(`"${p.academy_name}" 계정을 삭제하시겠습니까?\n삭제하면 해당 파트너는 더 이상 로그인할 수 없습니다.`))return;
    const {error}=await sb.from('profiles').delete().eq('id',p.id);
    if(error){showToast('삭제 중 오류가 발생했습니다.','error');return;}
    setPartners(prev=>prev.filter(x=>x.id!==p.id));
    showToast(`"${p.academy_name}" 계정이 삭제되었습니다.`);
  }

  async function sendPasswordReset(email){
    await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
    showToast(email+'로 비밀번호 재설정 이메일을 발송했습니다.');
  }

  async function handleMyPwChange(){
    if(!myPw||!myPw2){setMyPwErr('새 비밀번호를 입력해주세요.');return;}
    if(myPw!==myPw2){setMyPwErr('비밀번호가 일치하지 않습니다.');return;}
    if(myPw.length<6){setMyPwErr('비밀번호는 6자 이상이어야 합니다.');return;}
    setMyPwLoading(true);setMyPwErr('');
    const {error}=await sb.auth.updateUser({password:myPw});
    setMyPwLoading(false);
    if(error){setMyPwErr('변경 중 오류가 발생했습니다.');return;}
    setMyPwOk(true);setMyPw('');setMyPw2('');
    showToast('비밀번호가 변경되었습니다.');
    setTimeout(()=>setMyPwOk(false),3000);
  }

  async function handleRequestSubmit(){
    if(!rName.trim()||!rPhone.trim()){showToast('학원명과 연락처는 필수입니다.','error');return;}
    setRSubmitting(true);
    const {error}=await sb.from('material_requests').insert({
      user_id:user?.id||null,academy_name:rName.trim(),manager_name:rManager.trim(),phone:rPhone.trim(),email:rEmail.trim(),
      types:rTypes,qty:rQty,size:rSize,print_option:rPrint,copy_option:rCopy,usage_note:rUsage,
      deadline:rDeadline,budget:rBudget,note:rNote,status:'pending',
    });
    setRSubmitting(false);
    if(error){showToast('요청 접수 중 오류가 발생했습니다.','error');return;}
    setRSubmitted(true);
    showToast('자료 요청이 접수되었습니다!');
  }

  const filtered=materials.filter(m=>{
    if(filterC!=='전체'&&m.country!==filterC)return false;
    if(filterP!=='전체'&&m.program!==filterP)return false;
    if(filterF!=='전체'&&m.format!==filterF)return false;
    if(query&&!m.title.includes(query))return false;
    return true;
  });

  const navItems=[
    {id:'dashboard',label:'대시보드',icon:'ti-home'},
    {id:'library',label:'자료실',icon:'ti-folder'},
    {id:'request',label:'자료 요청',icon:'ti-send'},
    {id:'notices',label:'공지사항',icon:'ti-bell',badge:!notifSeen?newNotifCount:0},
    {id:'mypage',label:'마이페이지',icon:'ti-user'},
    ...(isAdmin?[{id:'admin',label:'관리자',icon:'ti-settings'}]:[]),
  ];

  function FilterGroup({label,options,value,onChange}){
    return (
      <div>
        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,fontWeight:500}}>{label}</div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {options.map(o=>(
            <Btn key={o} onClick={()=>onChange(o)}
              style={{fontSize:12,padding:'5px 10px',borderRadius:'var(--radius)',border:value===o?`1.5px solid ${NAVY}`:'0.5px solid var(--border-strong)',background:value===o?NAVY:'var(--surface-2)',color:value===o?'#fff':'var(--text-secondary)',fontWeight:value===o?500:400}}>
              {o}
            </Btn>
          ))}
        </div>
      </div>
    );
  }

  function MatCard({item:m}){
    const c=countryMeta(m.country);
    const isDone=dlDone.has(m.id),isLoad=dlLoading===m.id;
    return (
      <div style={{background:'var(--surface-2)',border:'0.5px solid var(--border)',borderRadius:12,overflow:'hidden',display:'flex',flexDirection:'column',borderLeft:`3px solid ${c.color}`}}>
        <div style={{padding:'14px 14px 10px',flex:1,cursor:'pointer'}} onClick={()=>setMatModal(m)}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:8,flexWrap:'wrap'}}>
            <CoBadge country={m.country} small/>
            {m.is_hot&&<span style={{fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:3,background:'#FAEEDA',color:'#BA7517'}}>HOT</span>}
            {m.is_new&&<span style={{fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:3,background:'#EAF3DE',color:'#3B6D11'}}>NEW</span>}
          </div>
          <div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)',lineHeight:1.45,marginBottom:10,minHeight:38}}>{m.title}</div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
            <FmtBadge format={m.format}/>
            <span style={{fontSize:11,color:'var(--text-muted)'}}>{m.size}</span>
            <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto'}}>{m.created_at?.slice(0,10)}</span>
          </div>
        </div>
        <div style={{borderTop:'0.5px solid var(--border)',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:11,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}>
            <i className="ti ti-download" style={{fontSize:12}}></i>{m.downloads||0}
          </span>
          <Btn onClick={()=>!isDone&&!isLoad&&handleDownload(m)}
            style={{fontSize:12,padding:'5px 12px',borderRadius:'var(--radius)',fontWeight:500,minWidth:80,justifyContent:'center',background:isDone?'#E5F2EC':isLoad?'var(--surface-1)':NAVY,color:isDone?'#006338':isLoad?'var(--text-muted)':'#fff'}}>
            {isDone?<><i className="ti ti-check" style={{fontSize:13}}></i>완료</>:isLoad?<><i className="ti ti-loader-2" style={{fontSize:13}}></i>받는 중</>:<><i className="ti ti-download" style={{fontSize:13}}></i>다운로드</>}
          </Btn>
        </div>
      </div>
    );
  }

  function StatusBadge({s}){
    const m={pending:['#C07000','#FFF3E0','승인 대기'],approved:['#006338','#E5F2EC','승인'],rejected:['var(--text-danger)','var(--bg-danger)','반려']};
    const [col,bg,lbl]=m[s]||['#555','#eee',s];
    return <span style={{fontSize:11,fontWeight:500,padding:'3px 8px',borderRadius:4,background:bg,color:col}}>{lbl}</span>;
  }

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* 사이드바 */}
      <div style={{width:220,background:NAVY,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <img src={LOGO_WHITE} alt="인투유학" style={{height:30,objectFit:'contain'}}/>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.28)',marginTop:5,letterSpacing:'0.07em'}}>intoedu Partner Hub</div>
        </div>
        <nav style={{padding:'10px',flex:1}}>
          {navItems.map(n=>(
            <Btn key={n.id} onClick={()=>{setTab(n.id);if(n.id==='notices')setNotifSeen(true);if(n.id==='admin'){loadPartners();loadRequests();}}}
              style={{width:'100%',padding:'9px 12px',borderRadius:'var(--radius)',background:tab===n.id?NAVY_L:'transparent',color:tab===n.id?'#fff':'rgba(255,255,255,0.5)',fontSize:14,marginBottom:2,justifyContent:'flex-start'}}>
              <i className={`ti ${n.icon}`} style={{fontSize:17}}></i>{n.label}
              {n.badge>0&&<span style={{marginLeft:'auto',background:GOLD,color:'#fff',fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:10}}>{n.badge}</span>}
            </Btn>
          ))}
        </nav>
        <div style={{padding:'14px 16px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <i className="ti ti-user" style={{fontSize:15,color:'rgba(255,255,255,0.6)'}}></i>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayName}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.35)'}}>{isAdmin?'관리자':'MOU 파트너'}</div>

                  <div style={{display:'flex',gap:10,marginBottom:14}}>
                    <div style={{flex:1}}>
                      <input value={newCountryName} onChange={e=>setNewCountryName(e.target.value)} placeholder="국가명 (예: 인도네시아)"/>
                    </div>
                    <div style={{width:120}}>
                      <input value={newCountryCode} onChange={e=>setNewCountryCode(e.target.value)} placeholder="코드 (예: ID)" maxLength={4}/>
                    </div>
                    <Btn onClick={handleAddCountry} disabled={addingCountry}
                      style={{padding:'0 18px',background:NAVY,color:'#fff',borderRadius:'var(--radius)',fontSize:13,fontWeight:500}}>
                      {addingCountry?'추가 중...':'추가'}
                    </Btn>
                  </div>
                  <div style={{borderTop:'0.5px solid var(--border)',paddingTop:14}}>
                    <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>현재 국가 목록</div>
                    {loadingCountries?(
                      <div style={{padding:'1rem',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>불러오는 중...</div>
                    ):countries.length===0?(
                      <div style={{padding:'1rem',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>등록된 국가가 없습니다.</div>
                    ):(
                      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                        {countries.map(c=>(
                          <div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 6px 6px 12px',borderRadius:20,background:c.bg,color:c.color,fontSize:13,fontWeight:500}}>
                            {c.name} <span style={{fontSize:10,opacity:0.8}}>({c.code})</span>
                            <Btn onClick={()=>handleDeleteCountry(c)} style={{background:'rgba(0,0,0,0.08)',color:'inherit',padding:'2px 6px',borderRadius:'50%'}}>
                              <i className="ti ti-x" style={{fontSize:11}}></i>
                            </Btn>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   최상위 앱 라우터
   ══════════════════════════════════════════════ */
function App(){
  const [appState,setAppState]=useState('loading');
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [authScreen,setAuthScreen]=useState('login');
  const [authMsg,setAuthMsg]=useState('');

  async function resolveUser(u){
    if(!u){setAppState('auth');setUser(null);setProfile(null);setIsAdmin(false);return;}
    setUser(u);
    if(u.email===ADMIN_EMAIL){setIsAdmin(true);setProfile(null);setAppState('main');return;}
    const {data:prof}=await sb.from('profiles').select('*').eq('id',u.id).single();
    setProfile(prof);
    if(!prof){setAuthMsg('계정이 비활성화되었습니다. 관리자에게 문의해주세요.');setAppState('auth');await sb.auth.signOut();return;}
    setIsAdmin(false);setAppState('main');
  }

  useEffect(()=>{
    if(!CONFIGURED){setAppState('setup');return;}
    const hash=window.location.hash;
    if(hash.includes('type=recovery')){setAppState('reset');return;}
    sb.auth.getSession().then(({data:{session}})=>resolveUser(session?.user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY'){setAppState('reset');return;}
      resolveUser(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if(appState==='setup')    return <SetupScreen/>;
  if(appState==='loading')  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#0D1E3A,#1B2B4B)'}}><i className="ti ti-loader-2" style={{fontSize:32,color:'rgba(255,255,255,0.4)'}}></i></div>;
  if(appState==='reset')    return <ResetPasswordScreen/>;
  if(appState==='main')     return <MainApp user={user} profile={profile} isAdmin={isAdmin}/>;

  return authScreen==='login'
    ? <LoginScreen onSignup={()=>{setAuthScreen('signup');setAuthMsg('');}} authMsg={authMsg} onClearMsg={()=>setAuthMsg('')}/>
    : <SignupScreen onLogin={()=>{setAuthScreen('login');setAuthMsg('');}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
